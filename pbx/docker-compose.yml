services:
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./certs:/certs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - pbx-net

  coturn:
    image: coturn/coturn:latest
    container_name: coturn
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
      - ./certs:/certs:ro
    env_file: .env

  freeswitch:
    image: safarov/freeswitch:latest
    container_name: freeswitch
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./freeswitch/conf:/etc/freeswitch:rw
      - ./freeswitch/scripts:/usr/share/freeswitch/scripts:ro
    environment:
      - DEFAULT_PASSWORD=${FS_DEFAULT_PASSWORD}
    env_file: .env
    logging:
      driver: loki
      options:
        loki-url: "http://loki:3100/loki/api/v1/push"

  api:
    build: ./api
    container_name: pbx-api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      - LOKI_URL=http://loki:3100
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_HOST=redis
    env_file: .env
    networks:
      - pbx-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.${FQDN}`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8080"
    logging:
      driver: loki
      options:
        loki-url: "http://loki:3100/loki/api/v1/push"

  config-gen:
    build: ./config-gen
    container_name: config-gen
    restart: unless-stopped
    depends_on:
      - postgres
    volumes:
      - ./freeswitch/conf:/etc/freeswitch:rw
    env_file: .env
    networks:
      - pbx-net
    logging:
      driver: loki
      options:
        loki-url: "http://loki:3100/loki/api/v1/push"

  provisioning:
    build: ./provisioning
    container_name: provisioning
    restart: unless-stopped
    depends_on:
      - postgres
    env_file: .env
    networks:
      - pbx-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.provisioning.rule=Host(`${FQDN}`) && PathPrefix(`/provisioning`)"
      - "traefik.http.routers.provisioning.entrypoints=websecure"
      - "traefik.http.routers.provisioning.tls=true"
      - "traefik.http.routers.provisioning.tls.certresolver=letsencrypt"
      - "traefik.http.services.provisioning.loadbalancer.server.port=8081"
    logging:
      driver: loki
      options:
        loki-url: "http://loki:3100/loki/api/v1/push"

  admin-ui:
    build: ./admin-ui
    container_name: admin-ui
    restart: unless-stopped
    env_file: .env
    networks:
      - pbx-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`${FQDN}`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls=true"
      - "traefik.http.routers.admin.tls.certresolver=letsencrypt"
      - "traefik.http.services.admin-ui.loadbalancer.server.port=3000"
    logging:
      driver: loki
      options:
        loki-url: "http://loki:3100/loki/api/v1/push"

  webclient:
    build: ./webclient
    container_name: webclient
    restart: unless-stopped
    env_file: .env
    networks:
      - pbx-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phone.rule=Host(`${FQDN}`) && PathPrefix(`/phone`)"
      - "traefik.http.routers.phone.entrypoints=websecure"
      - "traefik.http.routers.phone.tls=true"
      - "traefik.http.routers.phone.tls.certresolver=letsencrypt"
      - "traefik.http.services.webclient.loadbalancer.server.port=3001"
    logging:
      driver: loki
      options:
        loki-url: "http://loki:3100/loki/api/v1/push"

  # Standard PostgreSQL (Replaced Supabase)
  postgres:
    image: postgres:16-alpine
    networks: [pbx-net]
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: telofon
      POSTGRES_USER: telofon
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telofon"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    networks:
      - pbx-net

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
    env_file: .env
    networks:
      - pbx-net

  loki:
    image: grafana/loki:latest
    container_name: loki
    user: "0"
    restart: unless-stopped
    volumes:
      - ./data/loki:/loki
    networks:
      - pbx-net

networks:
  pbx-net:
    name: pbx-net
    driver: bridge
